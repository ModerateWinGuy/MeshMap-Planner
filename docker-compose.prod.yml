# TrueNAS deployment compose — pulls the pushed image (no build), persists the terrain cache to
# a pool dataset, and publishes a UNIQUE host port for the host's nginx reverse proxy to route a
# subdomain to. Build + push from the dev machine first (`pnpm docker:release`).
#
# Copy this to the NAS (e.g. as docker-compose.yml in a TrueNAS Custom App), or run with
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: moderatewinguy/meshmap-planner:latest
    environment:
      - HOME=/root
      - TERM=xterm
      - DEM_PROVIDERS=local,linz,srtm
      - LOCAL_SDF_DIR=/app/local_sdf
      - SPLAT_CACHE_DIR=/app/.splat_tiles
      - SPLAT_PATH=/app/splat
      - LINZ_TILE_CACHE_GB=64
      - LINZ_TILE_TTL_DAYS=180
      - LINZ_TILE_MINZOOM=11
      - LINZ_TILE_MAXZOOM_DEM=15
      - LINZ_TILE_MAXZOOM_DSM=14
    volumes:
      # Persistent terrain/SDF cache on your pool — full NZ ≈ 50–90 GB. Create the dir first.
      - /mnt/HSP/Apps/meshmapper/splat_cache:/app/.splat_tiles
      # Optional: extra hand-curated .sdf tiles beyond those baked into the image.
      - /mnt/pool/apps/meshmap/local_sdf:/app/local_sdf:ro
    mem_limit: 4G
    ports:
      # HOST_PORT must be UNIQUE on the NAS — 8080 is already taken by nginx/other containers.
      # The container stays on 8080 internally; only the host side changes. Point nginx at
      # http://<truenas-ip>:18080. Alternative: drop this ports: block and attach app to nginx's
      # docker network, routing to app:8080 by name (no host port published).
      - "18080:8080"
    depends_on:
      - redis
    working_dir: "/app"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--forwarded-allow-ips", "*"]
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: meshmap-redis
    command: [redis-server]
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
