name: Deploy to GitHub Pages

# Build the static SPA and publish dist/ to GitHub Pages on every push to main.
# Requires repo Settings -> Pages -> Source: "GitHub Actions" (one-time, manual).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum permissions for the Pages deployment to mint its OIDC token and publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress run finish (don't cancel mid-deploy), but only one deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Vite inlines VITE_* env vars into the bundle at build time, so the LINZ key must be present
      # here. Stored as a repo secret (Settings → Secrets and variables → Actions). Note: it ends up
      # in the published JS — it's protected by LINZ's domain restriction on the Developer key, not by
      # being secret. If unset, the LINZ overlay just falls back to the AWS Terrarium baseline.
      - run: pnpm build
        env:
          VITE_LINZ_API_KEY: ${{ secrets.VITE_LINZ_API_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
