# Build the multi-stage image and publish it to GHCR on every push to main.
# The image lands at ghcr.io/<owner>/meshmap-planner (name lowercased by metadata-action).
name: Build and publish image

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab without a code push.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The Dockerfile compiles SPLAT! from the `splat` git submodule, so it must be present.
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so the mixed-case repo (MeshMap-Planner)
          # resolves to ghcr.io/<owner>/meshmap-planner.
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to avoid recompiling SPLAT! and rebuilding the SPA each push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
