# Optional backend hot-reload overlay — OPT-IN (not auto-merged). Apply it explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build   (= pnpm docker:reload)
#
# Bind-mounts only the Python SOURCE (not all of ./app) and runs uvicorn --reload, so backend
# edits hot-reload without an image rebuild. We deliberately do NOT mount ./app wholesale: the
# built frontend lives at app/ui, and mounting ./app would shadow the image's baked-in SPA with
# whatever stale build happens to be on the host. The SPA therefore stays the version baked into
# the image — for live frontend work use `pnpm run dev` (Vite, port 5173) instead.
services:
  app:
    volumes:
      - ./app/main.py:/app/app/main.py
      - ./app/models:/app/app/models
      - ./app/services:/app/app/services
      - ./splat_cache:/app/.splat_tiles
      - ./local_sdf:/app/local_sdf:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
