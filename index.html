<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>MeshMap Planner</title>

    <!-- Link-unfurl preview card. Crawlers don't run our JS and never receive the URL hash, so this is
         necessarily one static (generic) card for every shared link. Absolute URLs are required — change
         the origin here if the app moves off this GitHub Pages address (e.g. a custom domain). -->
    <meta name="description" content="Plan mesh radio links and coverage on real terrain." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MeshMap Planner" />
    <meta property="og:description" content="Plan mesh radio links and coverage on real terrain." />
    <meta property="og:url" content="https://moderatewinguy.github.io/MeshMap-Planner/" />
    <meta property="og:image" content="https://moderatewinguy.github.io/MeshMap-Planner/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MeshMap Planner" />
    <meta name="twitter:description" content="Plan mesh radio links and coverage on real terrain." />
    <meta name="twitter:image" content="https://moderatewinguy.github.io/MeshMap-Planner/og-card.png" />

    <!-- Privacy-friendly analytics (no cookies, no personal data). Skips itself on localhost. -->
    <script data-goatcounter="https://moderatewinguy.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
