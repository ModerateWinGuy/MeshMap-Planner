services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./ui:/app/ui
      # Drop hand-prepared SPLAT! .sdf tiles here to override any source (read-only in container).
      - ./local_sdf:/app/local_sdf:ro
      # Persist the terrain tile/SDF cache on the host so live-fetched LINZ cells and SRTM tiles
      # survive restarts AND image rebuilds — the first build of a 1-degree NZ cell is the slow
      # step, so don't repeat it. A host bind mount (not a named volume) keeps the cache as a
      # plain, inspectable, backup-able folder you control.
      - ./splat_cache:/app/.splat_tiles
    environment:
      - HOME=/root
      - TERM=xterm
      - VIRTUAL_HOST=your-domain.example
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=your-domain.example
      # Terrain (DEM) provider chain, in precedence order. Each provider reads its own config.
      - DEM_PROVIDERS=local,linz,srtm
      - LOCAL_SDF_DIR=/app/local_sdf
      - SPLAT_CACHE_DIR=/app/.splat_tiles
      - SPLAT_PATH=/app/splat
    mem_limit: 12G
    ports:
      - 8080:8080
    depends_on:
      - redis
    working_dir: "/app"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    command: [redis-server]
    restart: unless-stopped
    networks:
      - app-network

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - 80:80
      - 443:443
    environment:
      - TRUST_DOWNSTREAM_PROXY=true
    volumes:
      # The vhost and conf volumes are only required
      # if you plan to obtain standalone certificates
      # - vhost:/etc/nginx/vhost.d
      # - conf:/etc/nginx/conf.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - app-network

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    environment:
      - DEFAULT_EMAIL=moderatewinguy@gmail.com
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

networks:
  app-network:

volumes:
  # vhost:
  # conf:
  html:
  certs:
  acme: