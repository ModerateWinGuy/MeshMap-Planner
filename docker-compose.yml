services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Image tag used by `docker compose build` and `docker compose push` (Docker Hub).
    image: moderatewinguy/meshmap-planner:latest
    environment:
      - HOME=/root
      - TERM=xterm
      # Terrain (DEM) provider chain, in precedence order. Each provider reads its own config.
      - DEM_PROVIDERS=local,linz,srtm
      - LOCAL_SDF_DIR=/app/local_sdf
      - SPLAT_CACHE_DIR=/app/.splat_tiles
      - SPLAT_PATH=/app/splat
      # 3D-map terrain tiles (LINZ DEM/DSM served as terrarium raster-dem over NZ). Cached in a
      # dedicated LRU cache under SPLAT_CACHE_DIR/xyz on the bind mount below.
      - LINZ_TILE_CACHE_GB=64
      - LINZ_TILE_TTL_DAYS=180        # 0 = never expire (per-survey LIDAR is immutable)
      - LINZ_TILE_MINZOOM=11          # below this, redirect to AWS Terrarium (LIDAR detail invisible)
      - LINZ_TILE_MAXZOOM_DEM=15      # ~3.6 m at NZ — beats the current 8 m AWS baseline
      - LINZ_TILE_MAXZOOM_DSM=14      # ~7 m at NZ — crisp surface detail, lighter than z15
    volumes:
      # Drop hand-prepared SPLAT! .sdf tiles here to override any source (read-only in container).
      - ./local_sdf:/app/local_sdf:ro
      # Persist the terrain tile/SDF cache on the host so live-fetched LINZ cells and SRTM tiles
      # survive restarts AND image rebuilds — the first build of a 1-degree NZ cell is the slow step.
      - ./splat_cache:/app/.splat_tiles
    mem_limit: 12G
    ports:
      - 8080:8080
    depends_on:
      - redis
    working_dir: "/app"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: meshmap-redis
    command: [redis-server]
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
